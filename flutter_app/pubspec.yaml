name: gallery
description: "ACGWarehouse Flutter frontend - image gallery with AI tag management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  http: ^1.2.0
  cached_network_image: ^3.3.1
  extended_image: ^8.2.1
  flutter_cache_manager: ^3.3.1

  fluent_ui: ^4.9.1
  window_manager: ^0.4.3
  shared_preferences: ^2.2.2
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
