server:
  host: "0.0.0.0"
  port: 8080
  env: "production"

database:
  type: "sqlite"
  path: ""
  connection_string: ""
  # d1_api_url: "https://api.acgwarehouse.cloud"
  # d1_api_key: ""
  # d1_readonly: true

storage:
  scan_roots:
    - "E:\\picture\\xp十环"

ai:
  provider: "doubao"
  api_key: ""
  model: "doubao-seed-2-0-pro-260215"
  fallback_models:
    - "doubao-seed-2-0-lite-260215"
    - "doubao-seed-2-0-mini-260215"
  # provider: "qwen"
  # api_key: ""
  # model: "qwen-vl-max"
  doubao_batch_mode: "auto"
  requests_per_minute: 60
  max_concurrency: 3  # 同时执行的最大AI请求数，默认3
  auto_scan_interval_minutes: 2      # 扫描间隔（分钟）
  auto_scan_batch_size: 100          # 每批处理数量
  auto_ai_tag_on_import: true        # 必须设为 true

# cos:
#   bucket_url: ""
#   secret_id: ""
#   secret_key: ""

# MinIO S3 存储配置（thumbnail_storage_provider 设为 "minio" 时生效）
minio:
  endpoint: ""
  access_key: ""
  secret_key: ""
  bucket: ""
  use_ssl: false

# 缩略图存储后端: "cos" (默认) 或 "minio"
# thumbnail_storage_provider: "cos"

admin:
  username: "admin"
  password: "admin"


# Worker pool configuration for background job processing
worker_pool:
  # Number of concurrent workers processing jobs (default: 4)
  worker_count: 10
  # Job queue buffer size (default: 512)
  queue_size: 512
  # How often to check for pending jobs to refill the queue, in seconds (default: 5)
  refill_interval_seconds: 5
  # Refill is triggered when queue size drops below this fraction of queue_size (default: 0.5)
  # For example, 0.5 means refill when queue has less than half capacity
  refill_threshold: 0.5
  refill_batch_size: 0
