# ACGWarehouse Configuration Example
# Copy this file to config.yaml and edit with your settings
#
# Usage:
#   1. cp deploy/config/config.example.yaml deploy/config/config.yaml
#   2. Edit deploy/config/config.yaml with your actual values
#   3. Run: docker compose up -d
#
# Note: All paths below are container-internal paths.
#       The docker-compose.yml maps host directories to these paths.

server:
  # Server host and port (0.0.0.0 for all interfaces)
  host: "0.0.0.0"
  port: 8080
  # Environment: "development" or "production"
  env: "production"

database:
  # Database type: "sqlite" (PostgreSQL not yet implemented)
  type: "sqlite"
  # Container-internal path to SQLite database file
  # This maps to ./data on the host via docker-compose volume
  path: "/data/acgwarehouse.db"
  # PostgreSQL connection string (not used with sqlite)
  connection_string: ""

storage:
  # Image library scan roots (container-internal paths)
  # These are mounted from host via docker-compose volumes
  scan_roots:
    - "/library"

ai:
  # AI provider: "doubao" (ByteDance), "qwen" (Alibaba), or "openai"
  provider: "doubao"
  # Your AI API key - REPLACE WITH YOUR ACTUAL KEY
  api_key: "YOUR_API_KEY_HERE"
  # AI model name
  model: "doubao-seed-2-0-lite-260215"
  # Rate limiting: requests per minute (default: 60)
  requests_per_minute: 60

# Optional: Tencent Cloud COS for thumbnail storage
# cos:
#   bucket_url: "https://your-bucket.cos.ap-guangzhou.myqcloud.com"
#   secret_id: "YOUR_COS_SECRET_ID"
#   secret_key: "YOUR_COS_SECRET_KEY"